version: 2
updates:
  - package-ecosystem: pip
    directory: "/"
    schedule:
      interval: weekly
    groups:
      python-dependencies:
        patterns: ["*"]

  # Keeps the digest-pinned base image in the Dockerfile current. Without this,
  # pinning by digest means never receiving a base-image security patch.
  - package-ecosystem: docker
    directory: "/"
    schedule:
      interval: weekly

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
